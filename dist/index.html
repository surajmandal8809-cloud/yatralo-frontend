<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yatralo - Flight & Hotel Booking</title>
  <style>
    #app-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 15% 20%, #fff1f1 0%, transparent 45%),
        radial-gradient(circle at 85% 80%, #ffe8ea 0%, transparent 48%),
        #ffffff;
      z-index: 9999;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    #app-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      min-width: 220px;
      padding: 28px 24px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 20px 40px rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.12);
      text-align: center;
      backdrop-filter: blur(2px);
    }

    .loader-spinner {
      width: 48px;
      height: 48px;
      margin: 0 auto 14px;
      border: 4px solid #ffe3e3;
      border-top-color: #ef4444;
      border-radius: 50%;
      animation: loader-spin 0.8s linear infinite;
    }

    .loader-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .loader-text {
      margin: 6px 0 0;
      font-size: 13px;
      color: #6b7280;
    }

    @keyframes loader-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-BT0Vbe2W.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-Bw3t-RDL.css">
</head>

<body>
  <div id="app-loader" aria-live="polite" aria-label="Loading">
    <div class="loader-card">
      <div class="loader-spinner"></div>
      <p class="loader-title">Yatralo</p>
      <p class="loader-text">Preparing your trip...</p>
    </div>
  </div>
  <div id="root"></div>
</body>

</html>
